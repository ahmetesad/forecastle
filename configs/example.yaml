experiment:
  name: wig20_log_return
  output_dir: outputs
  seed: 42
  device: auto

dataset:
  name: wig20
  csv_path: data/raw/wig20.csv
  date_column: Date
  target_column: Close
  target_transform: log_return
  feature_columns:
    - Open
    - High
    - Low
    - Close
    - Volume
  sequence_length: 30
  horizon: 1
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  scale_features: true
  scale_target: true
  dropna: true

training:
  batch_size: 64
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0
  patience: 8
  num_workers: 0
  models:
    - name: mlp
      params:
        hidden_sizes: [128, 64]
        dropout: 0.1
    - name: rnn
      params:
        hidden_size: 64
        num_layers: 1
        dropout: 0.0
    - name: lstm
      params:
        hidden_size: 64
        num_layers: 1
        dropout: 0.0
    - name: gru
      params:
        hidden_size: 64
        num_layers: 1
        dropout: 0.0
    - name: cnn1d
      params:
        channels: [32, 64]
        kernel_size: 3
        dropout: 0.1
