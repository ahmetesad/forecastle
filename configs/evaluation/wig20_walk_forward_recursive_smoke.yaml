experiment:
  name: wig20_walk_forward_recursive_smoke
  output_dir: outputs
  seed: 42
  device: auto

dataset:
  name: wig20
  source: csv
  csv_path: data/raw/wig20.csv
  date_column: Date
  target_column: Close
  target_transform: log_return
  feature_columns: [Close]
  technical_indicators:
    sma_periods: [5, 10, 15, 20]
    rsi_period: 14
    macd: {fast_period: 12, slow_period: 26, signal_period: 9}
  sequence_length: 30
  horizon: 5
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  scale_features: true
  scale_target: true

forecasting:
  strategy: recursive

evaluation:
  strategy: walk_forward
  window: expanding
  step_size: null
  max_folds: 2

training:
  batch_size: 64
  epochs: 1
  learning_rate: 0.001
  patience: 1
  models:
    - name: lstm_gru
      params: {lstm_hidden_size: 16, gru_hidden_size: 16, dropout: 0.1}
    - name: cnn_lstm
      params: {channels: [16], kernel_size: 3, lstm_hidden_size: 16, dropout: 0.1}
