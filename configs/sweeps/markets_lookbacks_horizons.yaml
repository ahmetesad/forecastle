base_config: configs/example.yaml

sweep:
  name: markets_lookbacks_horizons
  output_dir: outputs/sweeps

  datasets:
    - name: wig20
      csv_path: data/raw/wig20.csv
      date_column: Date
      target_column: Close
    - name: sp500
      csv_path: data/raw/sp500.csv
      date_column: Date
      target_column: Close
    - name: bist100
      csv_path: data/raw/bist100.csv
      date_column: Date
      target_column: Close

  feature_sets:
    ohlcv:
      - Open
      - High
      - Low
      - Close
      - Volume

  sequence_lengths:
    - 7
    - 14
    - 30
    - 60
    - 120

  horizons:
    - 1
    - 5
    - 10
    - 20
